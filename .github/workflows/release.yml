name: Release
on:
  push:
    branches:
      - main
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write # 某些 npm 发布验证需要
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release@25
      - name: Dual Publish to GitHub Packages
        # 这里尝试直接发布。如果 semantic-release 没有更新版本，
        # npm publish 会因为版本冲突报错，我们用 || true 容错，
        # 或者您可以根据需求决定是否需要强制停止。
        run: |
          # 检查 package.json 是否有版本变动（或者简单尝试发布）
          echo "@rbbtsn0w:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          # 尝试发布到 GitHub，如果版本已存在则跳过，不标记为失败
          npm publish --registry https://npm.pkg.github.com || echo "GitHub Packages: Version already exists or nothing to publish."
